name: Build PRoot for Android

on:
  workflow_dispatch:
    inputs:
      proot_commit:
        description: "termux/proot commit to build (leave blank to use version pinned in config)"
        required: false
        default: ""
      proot_version:
        description: "Version label for the release tag (e.g. 5.1.107)"
        required: false
        default: ""
      create_pr:
        description: "Automatically create a pull request to update proot assets"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read pinned version from config
        id: config
        run: |
          COMMIT=$(grep '^PROOT_COMMIT=' patches/build-proot-android/config | cut -d"'" -f2)
          VERSION=$(grep '^PROOT_VERSION=' patches/build-proot-android/config | cut -d"'" -f2)
          NDK_VERSION=$(grep '^NDK_VERSION=' patches/build-proot-android/config | cut -d"'" -f2)
          if [ -z "$COMMIT" ] || [ -z "$VERSION" ] || [ -z "$NDK_VERSION" ]; then
            echo "ERROR: One or more required variables (PROOT_COMMIT, PROOT_VERSION, NDK_VERSION) are missing from patches/build-proot-android/config." >&2
            exit 1
          fi
          echo "commit=${COMMIT}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "ndk_version=${NDK_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Resolve effective proot commit and version
        id: proot
        run: |
          COMMIT="${{ github.event.inputs.proot_commit }}"
          VERSION="${{ github.event.inputs.proot_version }}"
          if [ -z "$COMMIT" ]; then
            COMMIT="${{ steps.config.outputs.commit }}"
          fi
          if [ -z "$VERSION" ]; then
            VERSION="${{ steps.config.outputs.version }}"
          fi
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building proot commit $COMMIT (version $VERSION)"

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y make git wget

      - name: Download Android NDK ${{ steps.config.outputs.ndk_version }}
        run: |
          NDK_VERSION="${{ steps.config.outputs.ndk_version }}"
          wget -q "https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip" \
               -O /tmp/android-ndk.zip
          unzip -q /tmp/android-ndk.zip -d /opt
          mv "/opt/android-ndk-${NDK_VERSION}" /opt/android-ndk
          rm /tmp/android-ndk.zip
          echo "ANDROID_NDK_HOME=/opt/android-ndk" >> "$GITHUB_ENV"

      - name: Override proot commit in config (if provided via input)
        if: github.event.inputs.proot_commit != ''
        run: |
          sed -i "s/^PROOT_COMMIT=.*/PROOT_COMMIT='${{ steps.proot.outputs.commit }}'/" \
            patches/build-proot-android/config
          sed -i "s/^PROOT_VERSION=.*/PROOT_VERSION='${{ steps.proot.outputs.version }}'/" \
            patches/build-proot-android/config

      - name: Build proot
        working-directory: patches/build-proot-android
        run: |
          chmod +x build.sh get-proot.sh get-talloc.sh make-talloc-static.sh \
                    make-proot.sh make-proot-assets.sh pack.sh
          ./build.sh

      - name: Copy binaries to APK assets directory
        working-directory: patches/build-proot-android
        run: ./make-proot-assets.sh

      - name: Upload proot packages as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: proot-android-packages
          path: patches/build-proot-android/packages/*.tar.gz
          retention-days: 90

      - name: Upload proot asset libraries as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: proot-android-assets
          path: assets/libs/arm64-v8a/libproot*.so
          retention-days: 90

      - name: Create pull request to update proot assets
        if: ${{ github.event.inputs.create_pr == 'true' }}
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update proot assets to v${{ steps.proot.outputs.version }} (${{ steps.proot.outputs.commit }})"
          branch: "chore/update-proot-assets-${{ steps.proot.outputs.version }}"
          delete-branch: true
          title: "chore: update proot assets to v${{ steps.proot.outputs.version }}"
          body: |
            Automated update of proot asset libraries built from commit [`${{ steps.proot.outputs.commit }}`](https://github.com/termux/proot/commit/${{ steps.proot.outputs.commit }}) (version ${{ steps.proot.outputs.version }}).

            Updated files:
            - `assets/libs/arm64-v8a/libproot.so`
            - `assets/libs/arm64-v8a/libproot_loader.so`
          add-paths: |
            assets/libs/arm64-v8a/libproot.so
            assets/libs/arm64-v8a/libproot_loader.so
